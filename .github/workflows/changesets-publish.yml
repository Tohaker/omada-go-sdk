name: Publish Changesets

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: get_version
        run: echo "version=v$(cat version.txt)" >> $GITHUB_OUTPUT

  check-should-publish:
    runs-on: ubuntu-slim
    needs: get-version
    outputs:
      has_outdated: ${{ steps.get_tags.outputs.has_outdated }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Need full history for git operations
      - name: Get tags
        id: get_tags
        env:
          TAG: ${{ needs.get-version.outputs.version }}
        run: |
          # Check if the revision exists already
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "has_outdated=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_outdated=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    runs-on: ubuntu-latest
    needs: 
      - get-version
      - check-should-publish
    if: needs.check-should-publish.outputs.has_outdated == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Need full history for git operations

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Publish tag
        env:
          TAG: ${{ needs.get-version.outputs.version }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
      
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.get-version.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes