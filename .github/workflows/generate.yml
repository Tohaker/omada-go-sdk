name: Generate SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match vX.Y.Z format"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Fetch and fix spec
        run: go run tools/fix_spec.go

      - name: Generate SDK
        uses: docker://openapitools/openapi-generator-cli:v7.12.0
        with:
          args: >-
            batch
            /github/workspace/generator/batch.yaml

      - name: Tidy modules
        run: go mod tidy

      - name: Verify build
        run: |
          go build ./...
          go vet ./...

      - name: Commit generated code
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: regenerate SDK ${{ inputs.version }}"
            git push
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.commit.outputs.changes == 'true'
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"
